version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: resume-screening-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: resume-screening-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - DATABASE_NAME=resume_screening
      - JWT_SECRET_KEY=your-secret-key-change-in-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=1440
      - BACKEND_PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE_MB=10
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: resume-screening-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - app-network

volumes:
  mongodb_data:
  backend_uploads:

networks:
  app-network:
    driver: bridge
